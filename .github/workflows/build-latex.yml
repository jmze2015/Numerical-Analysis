name: Build LaTeX PDF

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: LaTeX
      
      - name: Rename PDF
        run: mv LaTeX/main.pdf LaTeX/notes.pdf
      
      - name: Commit PDF
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add LaTeX/notes.pdf
          git commit -m "Update notes PDF"
          git push || true
