name: Sync Overleaf

on:
  schedule:
    - cron: "0 5 * * *"   # once per day (9pm PST)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Pull from Overleaf
        run: |
          git remote add overleaf https://git:${{ secrets.OVERLEAF_TOKEN }}@git.overleaf.com/695c329fe08f973cfce0dd3e
          git fetch overleaf
          git merge overleaf/master -X theirs --allow-unrelated-histories

      - name: Push to GitHub
        run: |
          git push origin main
